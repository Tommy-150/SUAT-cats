<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUAT 🐱</title>
    <!-- 引入 marked 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;800&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Noto Sans SC', 'LXGW WenKai TC', sans-serif;
            background-color: #F7F5F0;
            color: #333;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255,200,150,0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(150,200,255,0.15) 0%, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
        }
        body.modal-open { overflow: hidden; }

        .loading-text { text-align: center; font-size: 1.2rem; color: #888; margin-top: 100px; grid-column: 1 / -1; }
        .error-text { text-align: center; font-size: 1.2rem; color: red; margin-top: 100px; grid-column: 1 / -1; }

        /* 顶部按钮行：左右两端对齐 */
        .top-link-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .top-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #555;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
        }
        .top-link:hover {
            background: rgba(74,74,74,0.08);
            border-color: #ccc;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; color: #4A4A4A; letter-spacing: 2px; }
        .header p { color: #888; margin-top: 8px; font-size: 1.1rem; }

        .filters { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 50px; }
        .filter-group { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }

        .filter-toggle {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 10px 26px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            border-radius: 50px; cursor: pointer; user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .filter-toggle:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .filter-toggle span:first-child { font-size: 1.1rem; font-weight: 700; color: #555; }
        .toggle-symbol {
            display: inline-block; width: 24px; height: 24px; font-size: 1.5rem; line-height: 24px;
            text-align: center; font-weight: 700; color: #666;
            transition: transform 0.3s ease, color 0.3s ease;
        }
        .filter-toggle.open { background: rgba(74,74,74,0.08); border-color: #ccc; }
        .filter-toggle.open .toggle-symbol { color: #4A4A4A; }

        .filter-options {
            display: none; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 14px;
            padding: 8px 0; animation: fadeDown 0.3s ease;
        }
        .filter-options.show { display: flex; }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .filter-btn {
            padding: 10px 24px; border: none; border-radius: 50px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            color: #666; font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.03); font-family: inherit;
            position: relative;
        }
        .filter-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .filter-btn.active { background: #4A4A4A; color: #fff; box-shadow: 0 8px 20px rgba(74,74,74,0.2); }

        .filter-btn.tag-btn.active {
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .filter-btn.tag-btn.active::after {
            content: '✓';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            background: #ffffff;
            color: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 1px solid #e0e0e0;
            z-index: 10;
        }
        .filter-btn.tag-btn[data-tag="all"].active::after {
            display: none;
        }

        .filter-btn.sort-btn { display: inline-flex; align-items: center; gap: 6px; }
        .sort-arrows { display: inline-flex; align-items: center; gap: 2px; font-size: 0.9rem; }
        .sort-arrows .arrow-up,
        .sort-arrows .arrow-down { transition: opacity 0.3s; }
        .filter-btn.sort-btn .arrow-up { opacity: 0.3; }
        .filter-btn.sort-btn .arrow-down { opacity: 1; }
        .filter-btn.sort-btn.asc .arrow-up { opacity: 1; }
        .filter-btn.sort-btn.asc .arrow-down { opacity: 0.3; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }

        /* ===== 卡片核心样式 ===== */
        .card {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); border-radius: 24px;
            padding: 30px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative; overflow: hidden; cursor: pointer;
            opacity: 0;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .card::after {
            content: "🔍 偷看这只喵";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247,245,240,0.92); backdrop-filter: blur(6px);
            color: #4A4A4A; font-size: 1.3rem; font-weight: 700; letter-spacing: 2px;
            display: flex; justify-content: center; align-items: flex-start; padding-top: 240px;
            opacity: 0; transition: opacity 0.3s ease; border-radius: 24px; pointer-events: none; z-index: 5;
        }
        .card:hover::after { opacity: 1; }

        .avatar-wrapper { width: 140px; height: 140px; margin: 0 auto 20px; position: relative; z-index: 10; border-radius: 24px; overflow: hidden; }
        .avatar {
            width: 100%; height: 100%; border-radius: 24px; object-fit: cover; border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: all 0.5s ease; display: block;
        }

        .status-icon {
            position: absolute; bottom: 5px; right: 5px; width: 36px; height: 36px; background: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 0; transform: scale(0.5); transition: all 0.3s ease; z-index: 11;
        }

        .name-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .name { font-size: 1.5rem; font-weight: 800; color: #333; }
        .gender { font-size: 1.2rem; }
        .gender.male { color: #5B8DEF; }
        .gender.female { color: #FF7E93; }
        .gender.unknown { color: #AAA; }

        .affection { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 10px; }
        .paw-empty { opacity: 0.2; }

        .card-tags-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 10px 0 12px;
        }
        .card-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            background: #ccc;
        }

        .desc { font-size: 0.9rem; color: #888; line-height: 1.6; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }

        .card.status-star { border: 1px solid #e0e0e0; }
        .card.status-star .avatar { filter: grayscale(100%); opacity: 0.8; }
        .card.status-star .status-icon { opacity: 1; transform: scale(1); }
        .card.status-star .name { color: #888; }

        .card.status-lost { border: 1px dashed #d0d0d0; }
        .card.status-lost .status-icon { opacity: 1; transform: scale(1); }
        .card.status-lost .name { color: #999; }

        .card.status-adopted { border: 1px solid #a0d2a0; }
        .card.status-adopted .status-icon { opacity: 1; transform: scale(1); }
        .card.status-adopted .name { color: #2d6a2d; }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Modal 弹窗样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex;
            justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: #fff; width: 90%; max-width: 700px; max-height: 85vh; border-radius: 24px; padding: 40px;
            position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: scale(0.9) translateY(20px); transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .close-btn {
            position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; background: #f0f0f0;
            border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; color: #666; transition: all 0.2s; z-index: 10;
        }
        .close-btn:hover { background: #e0e0e0; transform: rotate(90deg); }

        .modal-header { display: flex; gap: 25px; align-items: center; margin-bottom: 25px; }
        .modal-avatar-wrapper {
            position: relative; flex-shrink: 0; cursor: zoom-in; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .modal-avatar { width: 140px; height: 140px; object-fit: cover; display: block; border-radius: 20px; transition: transform 0.4s ease; }
        .zoom-hint {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247,245,240,0.88); display: flex; align-items: center; justify-content: center;
            color: #4A4A4A; font-size: 1rem; font-weight: 700; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s;
            border-radius: 20px; pointer-events: none;
        }
        .modal-avatar-wrapper:hover .modal-avatar { transform: scale(1.1); }
        .modal-avatar-wrapper:hover .zoom-hint { opacity: 1; }

        .modal-info { flex: 1; min-width: 0; }
        .modal-info h2 { font-size: 2rem; margin-bottom: 10px; color: #333; word-break: break-all; }
        .modal-meta { display: flex; gap: 20px; color: #888; font-size: 0.95rem; align-items: center; flex-wrap: wrap; }

        .modal-story { flex: 1; overflow-y: auto; padding-right: 10px; }
        .modal-story h3 { font-size: 1.2rem; color: #555; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px dashed #eee; }
        .modal-story p { font-size: 1.05rem; line-height: 1.9; color: #444; margin-bottom: 18px; text-align: justify; text-indent: 2em; }

        .modal-story::-webkit-scrollbar { width: 6px; }
        .modal-story::-webkit-scrollbar-track { background: transparent; }
        .modal-story::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .modal-tags-row {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px;
            padding-bottom: 15px; border-bottom: 2px dashed #eee;
        }
        .modal-tag {
            display: inline-block; background: #f2f2f2; color: #555;
            font-size: 0.85rem; font-weight: 700; padding: 4px 14px; border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .gallery-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; }
        .gallery-section.hidden { display: none; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .gallery-item {
            position: relative; aspect-ratio: 1/1; border-radius: 16px; overflow: hidden; cursor: zoom-in;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.3s ease;
        }
        .gallery-item:hover { transform: translateY(-4px); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item .zoom-hint { font-size: 0.9rem; background: rgba(247,245,240,0.88); color: #4A4A4A; border-radius: 16px; }
        .gallery-item:hover .zoom-hint { opacity: 1; }

        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .lightbox.active { opacity: 1; visibility: visible; }
        .lightbox-close {
            position: absolute; top: 30px; right: 30px; width: 44px; height: 44px; background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%; color: #fff; font-size: 1.5rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: background 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.4); }
        .lightbox-img {
            max-width: 90%; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.95); transition: all 0.4s ease;
        }
        .lightbox-img.loaded { opacity: 1; transform: scale(1); }

        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff;
            border-radius: 50%; position: absolute; animation: spin 0.8s linear infinite;
        }
        .spinner.hidden { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 编者留言弹窗 */
        .editor-modal .modal-content {
            max-width: 600px;
            padding: 30px;
        }
        .editor-modal .modal-story {
            text-align: left;
        }
        .editor-modal .modal-story h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4A4A4A;
        }

        /* ===== GitHub 风格 Markdown 样式 ===== */
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            color: #24292f;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 2em; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body code {
            background-color: rgba(175,184,193,0.2);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: monospace;
            font-size: 85%;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            margin-bottom: 16px;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #d0d7de;
            padding: 0 1em;
            color: #57606a;
            margin-bottom: 16px;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }
        .markdown-body table th, .markdown-body table td {
            border: 1px solid #d0d7de;
            padding: 6px 13px;
        }
        .markdown-body table th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
        }
        .markdown-body a {
            color: #0969da;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }

        /* 敏感词遮蔽样式 */
        .blocked-word {
            display: inline;
            background-color: #111111;
            color: transparent;
            border-radius: 3px;
            padding: 1px 3px;
            margin: 0 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 2px,
                    rgba(255,255,255,0.03) 2px,
                    rgba(255,255,255,0.03) 4px);
        }

        .blocked-word:hover {
            background-color: transparent;
            background-image: none;
            color: inherit;
            user-select: text;
            text-decoration: underline;
            text-decoration-color: rgba(0,0,0,0.15);
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- 顶部按钮行 -->
    <div class="top-link-row">
        <a href="index_mobile.html" class="top-link" title="前往手机版页面">📱 点我访问移动版</a>
        <a href="#" class="top-link" id="editorLink" title="编者留言">✉️ 编者留言</a>
    </div>

    <div class="header">
        <h1>SUAT 🐱</h1>
        <p>记录每一次相遇与告别</p>
    </div>

    <div class="filters">
        <!-- 筛选部分保持不变 -->
        <div class="filter-group">
            <div class="filter-toggle" id="genderToggle">
                <span>性别</span>
                <span class="toggle-symbol" id="genderSymbol">+</span>
            </div>
            <div class="filter-options" id="genderOptions">
                <button class="filter-btn gender-btn active" data-gender="all">全部性别</button>
                <button class="filter-btn gender-btn" data-gender="male">♂ 男孩</button>
                <button class="filter-btn gender-btn" data-gender="female">♀ 女孩</button>
                <button class="filter-btn gender-btn" data-gender="unknown">❓ 未知性别</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-toggle" id="statusToggle">
                <span>状态</span>
                <span class="toggle-symbol" id="statusSymbol">+</span>
            </div>
            <div class="filter-options" id="statusOptions">
                <button class="filter-btn status-btn active" data-status="all">全部状态</button>
                <button class="filter-btn status-btn" data-status="star">⭐ 喵星</button>
                <button class="filter-btn status-btn" data-status="lost">🔍 失踪</button>
                <button class="filter-btn status-btn" data-status="adopted">🏠 已领养</button>
            </div>
        </div>

        <div class="filter-group" id="tagFilterGroup" style="display: none;">
            <div class="filter-toggle" id="tagToggle">
                <span>Tag</span>
                <span class="toggle-symbol" id="tagSymbol">+</span>
            </div>
            <div class="filter-options" id="tagOptions">
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-toggle" id="sortToggle">
                <span>排序</span>
                <span class="toggle-symbol" id="sortSymbol">+</span>
            </div>
            <div class="filter-options" id="sortOptions">
                <button class="filter-btn sort-btn active" id="sortDefault">默认排序</button>
                <button class="filter-btn sort-btn" id="sortAffection">
                    按亲密度
                    <span class="sort-arrows">
                        <span class="arrow-up">▲</span>
                        <span class="arrow-down">▼</span>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div class="grid" id="catGrid">
        <p class="loading-text" id="loadingText">正在读取猫咪档案...</p>
    </div>

    <!-- 猫咪故事弹窗 -->
    <div class="modal-overlay" id="storyModal">
        <div class="modal-content" id="modalContent">
            <button class="close-btn" id="closeModal">✕</button>
            <div class="modal-header">
                <div class="modal-avatar-wrapper" id="modalAvatarWrapper">
                    <img src="" alt="" class="modal-avatar" id="modalAvatar">
                    <div class="zoom-hint">查看大图</div>
                </div>
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <div class="modal-meta">
                        <span id="modalGender"></span>
                        <span id="modalAffection"></span>
                    </div>
                </div>
            </div>
            <div class="modal-story">
                <div class="modal-tags-row hidden" id="modalTagsRow"></div>
                <h3>📖 我们的故事</h3>
                <div id="modalStoryText"></div>
                <div class="gallery-section hidden" id="gallerySection">
                    <h3>📸 更多瞬间</h3>
                    <div class="gallery-grid" id="galleryGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编者留言弹窗 -->
    <div class="modal-overlay editor-modal" id="editorModal">
        <div class="modal-content">
            <button class="close-btn" id="closeEditorModal">✕</button>
            <div class="modal-story">
                <h2>✉️ 编者留言</h2>
                <div id="editorMessage" class="markdown-body">正在加载...</div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <div class="spinner" id="lightboxSpinner"></div>
        <img src="" alt="HD Image" class="lightbox-img" id="lightboxImg">
    </div>

    <script>
        // ==================== 原有代码：完全不变 ====================
        const grid = document.getElementById('catGrid');
        const loadingText = document.getElementById('loadingText');
        const modal = document.getElementById('storyModal');
        const closeBtn = document.getElementById('closeModal');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxSpinner = document.getElementById('lightboxSpinner');
        const lightboxClose = document.getElementById('lightboxClose');
        const gallerySection = document.getElementById('gallerySection');
        const galleryGrid = document.getElementById('galleryGrid');
        const modalTagsRow = document.getElementById('modalTagsRow');

        let catsData = [];
        let currentGenderFilter = 'all';
        let currentStatusFilter = 'all';
        let currentHDUrl = '';
        let currentSort = 'default';
        let sortDirection = 'desc';
        let activeTags = new Set();

        let banWords = [];
        let tagColors = {};

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, char => map[char]);
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function maskSensitiveWords(text) {
            if (!banWords.length) return text;
            const sorted = [...banWords].sort((a, b) => b.length - a.length);
            const pattern = sorted.map(w => escapeRegex(w)).join('|');
            const regex = new RegExp(pattern, 'gi');
            return text.replace(regex, (match) => `<span class="blocked-word">${match}</span>`);
        }

        function getPaws(level) {
            let paws = '';
            for (let i = 1; i <= 5; i++) paws += i <= level ? '🐾' : '<span class="paw-empty">🐾</span>';
            return paws;
        }

        function getStatusIcon(status) {
            if (status === 'star') return '⭐';
            if (status === 'lost') return '🔍';
            if (status === 'adopted') return '🏠';
            return '';
        }

        function getGenderDisplay(gender) {
            if (gender === 'male') return '♂';
            if (gender === 'female') return '♀';
            return '❓';
        }

        function getGenderText(gender) {
            if (gender === 'male') return '♂ 男孩';
            if (gender === 'female') return '♀ 女孩';
            return '❓ 未知性别';
        }

        function getAllTags(cats) {
            const tagSet = new Set();
            cats.forEach(c => {
                if (c.tags && Array.isArray(c.tags)) {
                    c.tags.forEach(t => {
                        if (t && typeof t === 'string' && t.trim()) tagSet.add(t.trim());
                    });
                }
            });
            return [...tagSet].sort((a, b) => a.localeCompare(b, 'zh'));
        }

        function sortCats(cats) {
            if (currentSort === 'affection') {
                return [...cats].sort((a, b) => {
                    if (sortDirection === 'desc') return b.affection - a.affection;
                    else return a.affection - b.affection;
                });
            }
            return cats;
        }

        function updateSortUI() {
            const affectionBtn = document.getElementById('sortAffection');
            const defaultBtn = document.getElementById('sortDefault');
            if (!affectionBtn || !defaultBtn) return;
            if (currentSort === 'affection') {
                affectionBtn.classList.add('active');
                defaultBtn.classList.remove('active');
                if (sortDirection === 'asc') affectionBtn.classList.add('asc');
                else affectionBtn.classList.remove('asc');
            } else {
                affectionBtn.classList.remove('active', 'asc');
                defaultBtn.classList.add('active');
            }
        }

        function updateTagButtonStates() {
            const tagButtons = document.querySelectorAll('#tagOptions .tag-btn');
            tagButtons.forEach(btn => {
                const tag = btn.dataset.tag;
                if (tag === 'all') {
                    if (activeTags.size === 0) btn.classList.add('active');
                    else btn.classList.remove('active');
                } else {
                    if (activeTags.has(tag)) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        }

        function renderCats() {
            grid.innerHTML = '';
            let sortedCats = sortCats(catsData);
            let filteredCats = sortedCats;

            if (currentGenderFilter !== 'all') filteredCats = filteredCats.filter(c => c.gender === currentGenderFilter);
            if (currentStatusFilter !== 'all') filteredCats = filteredCats.filter(c => c.status === currentStatusFilter);

            if (activeTags.size > 0) {
                filteredCats = filteredCats.filter(c => {
                    if (!c.tags || !Array.isArray(c.tags)) return false;
                    return [...activeTags].some(tag => c.tags.includes(tag));
                });
            }

            if (filteredCats.length === 0) {
                grid.innerHTML = '<p class="loading-text">没有找到符合条件的猫咪</p>';
                return;
            }

            filteredCats.forEach((cat, index) => {
                const card = document.createElement('div');
                card.className = `card status-${cat.status || ''} fade-in`;
                card.style.animationDelay = `${index * 0.1}s`;
                const safeDesc = maskSensitiveWords(escapeHtml(cat.desc));

                let cardTagsHTML = '';
                if (cat.tags && cat.tags.length > 0) {
                    cardTagsHTML = `
                        <div class="card-tags-row">
                            ${cat.tags.map(t => {
                                const color = tagColors[t] || '';
                                const style = color ? `background-color:${color};color:#fff;` : '';
                                return `<span class="card-tag" style="${style}">${escapeHtml(t)}</span>`;
                            }).join('')}
                        </div>`;
                }

                card.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="${cat.avatar}" alt="${escapeHtml(cat.name)}" class="avatar">
                        <div class="status-icon">${getStatusIcon(cat.status)}</div>
                    </div>
                    <div class="name-row">
                        <span class="name">${escapeHtml(cat.name)}</span>
                        <span class="gender ${cat.gender}">${getGenderDisplay(cat.gender)}</span>
                    </div>
                    <div class="affection">${getPaws(cat.affection)}</div>
                    ${cardTagsHTML}
                    <div class="desc">${safeDesc}</div>
                `;
                card.addEventListener('click', () => openModal(cat));
                grid.appendChild(card);
            });
        }

        function openModal(cat) {
            document.getElementById('modalAvatar').src = cat.avatar;
            document.getElementById('modalName').innerText = cat.name;
            document.getElementById('modalGender').innerHTML = `<span class="gender ${cat.gender}">${getGenderText(cat.gender)}</span>`;
            document.getElementById('modalAffection').innerHTML = `亲人指数: ${getPaws(cat.affection)}`;

            if (cat.tags && cat.tags.length > 0) {
                modalTagsRow.classList.remove('hidden');
                modalTagsRow.innerHTML = cat.tags.map(t => {
                    const color = tagColors[t] || null;
                    const style = color ? `background-color:${color};color:#fff;` : '';
                    return `<span class="modal-tag" style="${style}">${escapeHtml(t)}</span>`;
                }).join('');
            } else {
                modalTagsRow.classList.add('hidden');
                modalTagsRow.innerHTML = '';
            }

            const safeStory = maskSensitiveWords(escapeHtml(cat.story));
            const paragraphs = safeStory.split('\n\n');
            const storyHTML = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
            document.getElementById('modalStoryText').innerHTML = storyHTML;

            galleryGrid.innerHTML = '';
            if (cat.otherPhotos && cat.otherPhotos.length > 0) {
                gallerySection.classList.remove('hidden');
                cat.otherPhotos.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${photo.thumb}" alt="Gallery photo">
                        <div class="zoom-hint">查看大图</div>
                    `;
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(photo.hd);
                    });
                    galleryGrid.appendChild(item);
                });
            } else {
                gallerySection.classList.add('hidden');
            }
            modal.classList.add('active');
            document.body.classList.add('modal-open');
            currentHDUrl = cat.avatar_hd;
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (lightbox.classList.contains('active')) closeLightbox();
                else if (modal.classList.contains('active')) closeModal();
                else if (document.getElementById('editorModal').classList.contains('active')) closeEditorModal();
            }
        });

        const modalAvatarWrapper = document.getElementById('modalAvatarWrapper');
        modalAvatarWrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            openLightbox(currentHDUrl);
        });

        function openLightbox(hdUrl) {
            lightbox.classList.add('active');
            lightboxSpinner.classList.remove('hidden');
            lightboxImg.classList.remove('loaded');
            const img = new Image();
            img.src = hdUrl;
            img.onload = () => {
                lightboxImg.src = hdUrl;
                lightboxSpinner.classList.add('hidden');
                setTimeout(() => lightboxImg.classList.add('loaded'), 50);
            };
            img.onerror = () => {
                lightboxImg.src = document.getElementById('modalAvatar').src;
                lightboxSpinner.classList.add('hidden');
                lightboxImg.classList.add('loaded');
            };
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

        const genderToggle = document.getElementById('genderToggle');
        const genderSymbol = document.getElementById('genderSymbol');
        const genderOptions = document.getElementById('genderOptions');
        const statusToggle = document.getElementById('statusToggle');
        const statusSymbol = document.getElementById('statusSymbol');
        const statusOptions = document.getElementById('statusOptions');
        const genderBtns = document.querySelectorAll('.gender-btn');
        const statusBtns = document.querySelectorAll('.status-btn');

        function setActive(buttons, activeButton) {
            buttons.forEach(b => b.classList.remove('active'));
            if (activeButton) activeButton.classList.add('active');
        }

        genderToggle.addEventListener('click', () => {
            const isOpen = genderOptions.classList.toggle('show');
            genderToggle.classList.toggle('open', isOpen);
            genderSymbol.textContent = isOpen ? '−' : '+';
        });
        statusToggle.addEventListener('click', () => {
            const isOpen = statusOptions.classList.toggle('show');
            statusToggle.classList.toggle('open', isOpen);
            statusSymbol.textContent = isOpen ? '−' : '+';
        });

        genderBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                currentGenderFilter = this.dataset.gender;
                setActive(genderBtns, this);
                renderCats();
            });
        });
        statusBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                currentStatusFilter = this.dataset.status;
                setActive(statusBtns, this);
                renderCats();
            });
        });

        document.getElementById('sortDefault').addEventListener('click', () => {
            currentSort = 'default';
            updateSortUI();
            renderCats();
        });
        document.getElementById('sortAffection').addEventListener('click', () => {
            if (currentSort === 'affection') {
                sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            } else {
                currentSort = 'affection';
                sortDirection = 'desc';
            }
            updateSortUI();
            renderCats();
        });

        const sortToggle = document.getElementById('sortToggle');
        const sortSymbol = document.getElementById('sortSymbol');
        const sortOptions = document.getElementById('sortOptions');
        sortToggle.addEventListener('click', () => {
            const isOpen = sortOptions.classList.toggle('show');
            sortToggle.classList.toggle('open', isOpen);
            sortSymbol.textContent = isOpen ? '−' : '+';
        });

        const tagFilterGroup = document.getElementById('tagFilterGroup');
        const tagToggle = document.getElementById('tagToggle');
        const tagSymbol = document.getElementById('tagSymbol');
        const tagOptions = document.getElementById('tagOptions');

        tagToggle.addEventListener('click', () => {
            const isOpen = tagOptions.classList.toggle('show');
            tagToggle.classList.toggle('open', isOpen);
            tagSymbol.textContent = isOpen ? '−' : '+';
        });

        tagOptions.addEventListener('click', (e) => {
            const btn = e.target.closest('.tag-btn');
            if (!btn) return;
            const tag = btn.dataset.tag;
            if (tag === 'all') {
                activeTags.clear();
            } else {
                if (activeTags.has(tag)) {
                    activeTags.delete(tag);
                } else {
                    activeTags.add(tag);
                }
            }
            updateTagButtonStates();
            renderCats();
        });

        function renderTagButtons(allTags) {
            if (allTags.length === 0) {
                tagFilterGroup.style.display = 'none';
                return;
            }
            tagFilterGroup.style.display = '';
            let html = '<button class="filter-btn tag-btn active" data-tag="all">全部Tag</button>';
            allTags.forEach(tag => {
                const color = tagColors[tag] || '';
                const style = color ? `background-color:${color};color:#fff;` : '';
                html += `<button class="filter-btn tag-btn" data-tag="${escapeHtml(tag)}" style="${style}">${escapeHtml(tag)}</button>`;
            });
            tagOptions.innerHTML = html;
            activeTags.clear();
            updateTagButtonStates();
        }

        // ==================== 编者留言功能（使用 marked） ====================
        function openEditorModal() {
            const editorModal = document.getElementById('editorModal');
            const editorMessage = document.getElementById('editorMessage');
            editorMessage.innerHTML = '正在加载...';
            editorModal.classList.add('active');
            document.body.classList.add('modal-open');

            fetch('README.md')
                .then(response => {
                    if (!response.ok) throw new Error('文件不存在');
                    return response.text();
                })
                .then(md => {
                    // 使用 marked.parse 进行 Markdown 转换
                    editorMessage.innerHTML = marked.parse(md);
                })
                .catch(() => {
                    editorMessage.innerHTML = '<p>暂时没有留言。</p>';
                });
        }

        function closeEditorModal() {
            document.getElementById('editorModal').classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        document.getElementById('editorLink').addEventListener('click', (e) => {
            e.preventDefault();
            openEditorModal();
        });
        document.getElementById('closeEditorModal').addEventListener('click', closeEditorModal);
        document.getElementById('editorModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editorModal')) closeEditorModal();
        });

        // ==================== 数据加载 ====================
        Promise.all([
            fetch('ban_words.json').then(r => r.ok ? r.json() : Promise.reject()).catch(() => null),
            fetch('tag_color.json').then(r => r.ok ? r.json() : Promise.reject()).catch(() => null)
        ]).then(([banData, colorData]) => {
            if (banData && banData.words && Array.isArray(banData.words)) {
                banWords = banData.words.map(w => w.trim()).filter(w => w.length > 0);
                banWords.sort((a, b) => b.length - a.length);
            }
            if (colorData && typeof colorData === 'object') {
                tagColors = colorData;
            }
        }).finally(() => {
            fetch('cats.json')
                .then(response => {
                    if (!response.ok) throw new Error('找不到 cats.json 文件');
                    return response.json();
                })
                .then(data => {
                    catsData = data;
                    if (loadingText) loadingText.remove();
                    updateSortUI();
                    const allTags = getAllTags(catsData);
                    renderTagButtons(allTags);
                    renderCats();
                })
                .catch(error => {
                    console.error('读取数据失败:', error);
                    grid.innerHTML = '<p class="error-text">❌ 读取猫咪档案失败，请检查 cats.json 文件是否存在且格式正确。</p>';
                });
        });
    </script>
</body>
</html>
