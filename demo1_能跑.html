<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 我的猫咪档案馆</title>
    <!-- 引入好看的圆润字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================= 基础重置与背景 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #F7F5F0; /* 治愈系奶油底色 */
            color: #333;
            min-height: 100vh;
            /* 背景装饰：柔和的渐变色块 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 200, 150, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(150, 200, 255, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
        }

        /* ================= 头部区域 ================= */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4A4A4A;
            letter-spacing: 2px;
        }
        .header p {
            color: #888;
            margin-top: 8px;
            font-size: 1.1rem;
        }

        /* ================= 筛选按钮区 ================= */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 50px;
        }
        .filter-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 50px; /* 胶囊形状 */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            color: #666;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-family: inherit;
        }
        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .filter-btn.active {
            background: #4A4A4A;
            color: #fff;
            box-shadow: 0 8px 20px rgba(74,74,74,0.2);
        }

        /* ================= 卡片网格布局 ================= */
        .grid {
            display: grid;
            /* 自动响应式列：最小280px，最大1fr，自动填充 */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ================= 猫咪卡片设计 ================= */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 弹性动画 */
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        /* 头像容器 */
        .avatar-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            position: relative;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }
        
        /* 状态图标（默认隐藏） */
        .status-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        /* 名字与性别 */
        .name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .name { font-size: 1.5rem; font-weight: 800; color: #333; }
        .gender { font-size: 1.2rem; }
        .gender.male { color: #5B8DEF; }
        .gender.female { color: #FF7E93; }

        /* 亲人指数 */
        .affection {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .paw-empty { opacity: 0.2; }

        /* 描述文字 */
        .desc {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.6;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }

        /* ================= 特殊状态的视觉隐喻 ================= */
        
        /* 1. 去了喵星 (Star) */
        .card.status-star {
            border: 1px solid #e0e0e0;
        }
        .card.status-star .avatar {
            filter: grayscale(100%); /* 变黑白 */
            opacity: 0.8;
        }
        .card.status-star .status-icon {
            opacity: 1;
            transform: scale(1);
        }
        .card.status-star .name { color: #888; }

        /* 2. 失踪 (Lost) */
        .card.status-lost {
            border: 1px dashed #d0d0d0;
        }
        .card.status-lost .avatar {
            filter: sepia(60%) saturate(60%); /* 泛黄复古感 */
            opacity: 0.7;
        }
        .card.status-lost .status-icon {
            opacity: 1;
            transform: scale(1);
        }
        .card.status-lost .name { color: #999; }

        /* 动画类：用于筛选时的淡入淡出 */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>🐾 喵星人档案馆</h1>
        <p>记录每一个相遇与告别</p>
    </div>

    <!-- 筛选按钮 -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">全部猫咪</button>
        <button class="filter-btn" data-filter="male">♂ 男孩</button>
        <button class="filter-btn" data-filter="female">♀ 女孩</button>
        <button class="filter-btn" data-filter="star">⭐ 去了喵星</button>
        <button class="filter-btn" data-filter="high-affection">🐾 超级亲人</button>
    </div>

    <!-- 卡片展示区 -->
    <div class="grid" id="catGrid">
        <!-- JS 会在这里动态生成卡片 -->
    </div>

    <script>
        // ================= 你的“数据库” =================
        // 以后要加猫，直接在这里照着格式加就行！
        const catsData = [
            {
                id: 1,
                name: "橘子",
                gender: "male", // male 或 female
                avatar: "https://images.unsplash.com/photo-1574158622682-e40e69881006?w=400", // 图片链接
                affection: 5, // 1-5
                status: "normal", // normal, star, lost
                desc: "一只贪吃的橘猫，给口吃的就能随便摸。"
            },
            {
                id: 2,
                name: "雪球",
                gender: "female",
                avatar: "https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=400",
                affection: 3,
                status: "normal",
                desc: "高冷的小公主，只允许我摸她的下巴。"
            },
            {
                id: 3,
                name: "小黑",
                gender: "male",
                avatar: "https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13?w=400",
                affection: 5,
                status: "star", // 去了喵星
                desc: "回到喵星去抓星星了，永远怀念你。"
            },
            {
                id: 4,
                name: "花花",
                gender: "female",
                avatar: "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=400",
                affection: 2,
                status: "lost", // 失踪
                desc: "2023年冬天走丢了，如果你看到她请告诉我。"
            },
            {
                id: 5,
                name: "胖虎",
                gender: "male",
                avatar: "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=400",
                affection: 4,
                status: "normal",
                desc: "看起来凶，其实是个嘤嘤怪，最喜欢踩奶。"
            }
        ];

        // ================= 渲染逻辑 =================
        const grid = document.getElementById('catGrid');

        // 生成猫爪指数 HTML
        function getPaws(level) {
            let paws = '';
            for(let i=1; i<=5; i++) {
                paws += i <= level ? '🐾' : '<span class="paw-empty">🐾</span>';
            }
            return paws;
        }

        // 获取状态图标
        function getStatusIcon(status) {
            if (status === 'star') return '⭐';
            if (status === 'lost') return '🔍';
            return '';
        }

        // 渲染卡片
        function renderCats(filter = 'all') {
            grid.innerHTML = ''; // 清空现有卡片

            // 筛选数据
            let filteredCats = catsData;
            if (filter === 'male') filteredCats = catsData.filter(c => c.gender === 'male');
            if (filter === 'female') filteredCats = catsData.filter(c => c.gender === 'female');
            if (filter === 'star') filteredCats = catsData.filter(c => c.status === 'star');
            if (filter === 'high-affection') filteredCats = catsData.filter(c => c.affection >= 4);

            // 生成 HTML
            filteredCats.forEach((cat, index) => {
                const card = document.createElement('div');
                // 拼接 CSS 类名，实现特殊状态的视觉变化
                card.className = `card status-${cat.status} fade-in`;
                // 增加一点延迟，让卡片依次出现（瀑布流动画）
                card.style.animationDelay = `${index * 0.1}s`; 

                card.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="${cat.avatar}" alt="${cat.name}" class="avatar">
                        <div class="status-icon">${getStatusIcon(cat.status)}</div>
                    </div>
                    <div class="name-row">
                        <span class="name">${cat.name}</span>
                        <span class="gender ${cat.gender}">${cat.gender === 'male' ? '♂' : '♀'}</span>
                    </div>
                    <div class="affection">${getPaws(cat.affection)}</div>
                    <div class="desc">${cat.desc}</div>
                `;
                grid.appendChild(card);
            });
        }

        // ================= 交互逻辑 =================
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 切换按钮激活状态
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // 重新渲染卡片
                renderCats(this.dataset.filter);
            });
        });

        // 页面加载时初始化
        renderCats();
    </script>
</body>
</html>
